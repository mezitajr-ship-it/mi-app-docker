name: Build Docker Image


on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:

  build:

    runs-on: ubuntu-latest


    steps:

      - name: Descargar código
        uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Obtener version de imagen #id de la imagen creada solo 7 digitos
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Construir imagen Docker
        run: |
          docker build \
          -t ghcr.io/mezitajr-ship-it/mi-app:${{ env.IMAGE_TAG }} \
          -t ghcr.io/mezitajr-ship-it/mi-app:latest \
          .
      - name: Publicar imagen en GHCR
        run: |
          docker push ghcr.io/mezitajr-ship-it/mi-app:${{ env.IMAGE_TAG }}     
          docker push ghcr.io/mezitajr-ship-it/mi-app:latest
